# Parallax model config — Qwen2.5-7B with memory snapshot for fast cold start
# Identical to qwen2.5-7b.yaml but with `enable_memory_snapshot: true`.
# Deploy as a separate Modal app to A/B cold-start times.
name: qwen2.5-7b-snap
hf_model_id: Qwen/Qwen2.5-7B-Instruct
served_model_name: qwen2.5-7b
gpu: A10G
gpu_count: 1
dtype: bfloat16
max_model_len: 2048
max_num_seqs: 256
gpu_memory_utilization: 0.92
enable_prefix_caching: true
guided_decoding_backend: xgrammar
min_containers: 0
scaledown_window: 300
allow_concurrent_inputs: 256
timeout: 600

# Snapshot flags
enable_memory_snapshot: true    # snapshot CPU state after imports
enable_gpu_snapshot: false       # requires Cls + sleep-mode refactor — see docs/roadmap.md
